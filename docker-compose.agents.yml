# Auto-generated by scripts/spawn-agent.py — do not edit manually.
# Apply with: docker compose -f docker-compose.yml -f docker-compose.agents.yml up -d

x-agent-base: &agent-base
  image: brainhome-dify:latest
  restart: unless-stopped
  entrypoint: ""
  command: uvicorn app:app --host 0.0.0.0 --port 3000
  depends_on:
    - postgres
  networks:
    - brainhome
  volumes:
    - huggingface_cache:/root/.cache/huggingface

services:

  agent-2:
    <<: *agent-base
    container_name: agent-2
    env_file:
      - ./config/dify.env
    environment:
      AGENT_ID: agent-2
      AGENT_NAME: DevOps
      AGENT_ROLE: devops
      SESSIONS_FILE: /app/data/sessions-2.json
      SYSTEM_PROMPT: "Sei un Senior DevOps Engineer specializzato in Docker, CI/CD e infrastruttura. Gestisci il sistema BrainHome."
    ports:
      - "3002:3000"
    volumes:
      - ./data/dify:/app/data
      - ./config:/config:ro
      - huggingface_cache:/root/.cache/huggingface

  agent-3:
    <<: *agent-base
    container_name: agent-3
    env_file:
      - ./config/dify.env
    environment:
      AGENT_ID: agent-3
      AGENT_NAME: Frontend
      AGENT_ROLE: frontend
      SESSIONS_FILE: /app/data/sessions-3.json
      SYSTEM_PROMPT: "Sei un Senior Frontend Developer. Ti occupi di HTML, CSS, JavaScript, UI/UX e web performance del sistema BrainHome."
    ports:
      - "3003:3000"
    volumes:
      - ./data/dify:/app/data
      - ./config:/config:ro
      - huggingface_cache:/root/.cache/huggingface

