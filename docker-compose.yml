# ─── Agent template ───────────────────────────────────────────────────────────
# All agent instances share the same image; only env-file and data volume differ.
# Use scripts/spawn-agent.py to instantiate new agents.
x-agent-base: &agent-base
  image: brainhome-dify:latest
  restart: unless-stopped
  entrypoint: ""
  command: uvicorn app:app --host 0.0.0.0 --port 3000
  depends_on:
    - postgres
  networks:
    - brainhome
  volumes:
    - huggingface_cache:/root/.cache/huggingface

services:
  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dify
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: dify
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - brainhome

  dify:
    <<: *agent-base
    build:
      context: ./services/dify_stub
    image: brainhome-dify:latest
    container_name: dify
    env_file:
      - ./config/dify.env
    environment:
      AGENT_ID: dify
      AGENT_NAME: Principale
      AGENT_ROLE: primary
    ports:
      - "3001:3000"
    volumes:
      - ./data/dify:/app/data
      - ./config:/config:ro
      - huggingface_cache:/root/.cache/huggingface

  fastapi:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    container_name: fastapi-agent
    restart: unless-stopped
    env_file:
      - ./config/fastapi.env
    volumes:
      - ./services/fastapi:/app
      - ./config:/config:ro
    ports:
      - "8000:80"
    depends_on:
      - dify
    networks:
      - brainhome

  watcher:
    build:
      context: ./services/watcher
    container_name: watcher
    restart: unless-stopped
    env_file:
      - ./config/watcher.env
    volumes:
      - ./data:/watch/data:ro
      - ./services:/watch/services:ro
      - ./data/watchdog:/app/logs
    depends_on:
      - dify
    networks:
      - brainhome

  agent-tools:
    build:
      context: ./services/agent-tools
    container_name: agent-tools
    restart: unless-stopped
    env_file:
      - ./config/agent-tools.env
    volumes:
      - ./data/agent-workspace:/workspace
      - ./data/watchdog:/app/logs
    ports:
      - "100.87.153.12:8001:8001"
    networks:
      - brainhome

networks:
  brainhome:
    driver: bridge

volumes:
  huggingface_cache:
