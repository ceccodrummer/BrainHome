<html><head><title>Calcolatrice</title></head><body><h1>Calcolatrice</h1><form><input type='number' id='num1' placeholder='Numero 1'><br><input type='number' id='num2' placeholder='Numero 2'><br><select id='operazione'><option value='addizione'>Addizione</option><option value='sottrazione'>Sottrazione</option><option value='moltiplicazione'>Moltiplicazione</option><option value='divisione'>Divisione</option></select><br><button onclick='calcola()'>Calcola</button><br><p id='risultato'></p></form><script>function calcola() {var num1 = parseFloat(document.getElementById('num1').value);var num2 = parseFloat(document.getElementById('num2').value);var operazione = document.getElementById('operazione').value;var risultato;if (operazione == 'addizione') {risultato = num1 + num2;} else if (operazione == 'sottrazione') {risultato = num1 - num2;} else if (operazione == 'moltiplicazione') {risultato = num1 * num2;} else if (operazione == 'divisione') {if (num2 != 0) {risultato = num1 / num2;} else {risultato = 'Errore: divisione per zero';}}document.getElementById('risultato').innerHTML = 'Risultato: ' + risultato;}</script></body></html>
